<!DOCTYPE html>
<html>
<head>
  <title>Finance Tools | Ambarish Pathak</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      padding: 40px;
    }

    .box {
      background: #0f172a;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>SIP Calculator</h1>

<div class="box">
  <input id="amount" placeholder="Monthly Investment (₹)">
  <input id="rate" placeholder="Return %">
  <input id="years" placeholder="Years">

  <button onclick="calc()">Calculate</button>

  <h3 id="result"></h3>
</div>

<script>
function calc() {
  let P = document.getElementById("amount").value;
  let r = document.getElementById("rate").value / 100 / 12;
  let n = document.getElementById("years").value * 12;

  let fv = P * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);

  document.getElementById("result").innerText =
    "Future Value: ₹" + Math.round(fv).toLocaleString();
}
</script>

</body>
</html>
