<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Goal Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

a {
  color: #2563eb;
  text-decoration: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

.card {
  background: #f8fafc;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border: 1px solid #cbd5e1;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

label {
  font-size: 14px;
  font-weight: 600;
}

table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}

td, th {
  padding: 6px;
  border-bottom: 1px solid #e2e8f0;
  text-align: right;
}

.status { font-size: 20px; margin-top: 10px; }
.gap { font-size: 16px; margin-top: 5px; }
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h1>Financial Goal Planner</h1>
  <a href="index.html">← Back to Home</a>
</div>

<p style="font-size:12px;color:#475569;">
This tool is pre-filled with example values to help you understand financial planning.
Please update based on your actual data. Not financial advice.
</p>

<div class="grid">

<div class="card">

<h3>🎯 Goal Settings</h3>

<label>Goal Duration (Years)</label>
<input id="goal" value="20">

<label>Target Wealth (₹)</label>
<input id="target" value="50000000">

<label>Inflation Rate (%)</label>
<input id="inflation" value="6">

<h3>💼 Assets</h3>
<div id="assets"></div>

<button onclick="calculate()">Calculate</button>
<button onclick="resetDefaults()">Reset to Default</button>
<button onclick="downloadExcel()">Download XLS</button>

<div class="status" id="status"></div>
<div class="gap" id="gap"></div>

</div>

<div class="card">

<h3>Projection</h3>
<table id="table"></table>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>

</div>

</div>

</div>

<script>

const assetNames = [
  "Provident Fund (PF)",
  "Public Provident Fund (PPF)",
  "National Pension Scheme (NPS)",
  "Direct Equity",
  "Mutual Fund (MF)"
];

const keys = ["PF","PPF","NPS","Equity","MF"];

const defaults = {
  PF: { current: 1000000, monthly: 10000, rate: 8.1 },
  PPF: { current: 500000, monthly: 5000, rate: 7.1 },
  NPS: { current: 200000, monthly: 10000, rate: 10 },
  Equity: { current: 1500000, monthly: 25000, rate: 12 },
  MF: { current: 800000, monthly: 15000, rate: 12 }
};

const assetDiv = document.getElementById("assets");

function renderAssets() {
  assetDiv.innerHTML = "";
  assetNames.forEach((name,i) => {
    let key = keys[i];

    assetDiv.innerHTML += `
      <h4>${name}</h4>

      <label>Current Amount (₹)</label>
      <input id="${key}_current" value="${defaults[key].current}">

      <label>Monthly Contribution (₹)</label>
      <input id="${key}_monthly" value="${defaults[key].monthly}">

      <label>Expected Return (% yearly)</label>
      <input id="${key}_rate" value="${defaults[key].rate}">
    `;
  });
}

renderAssets();

function resetDefaults() {
  renderAssets();
  goal.value = 20;
  target.value = 50000000;
  inflation.value = 6;
  calculate();
}

function fv(P, M, r, n) {
  if (r === 0) return P + (M * 12 * n);
  return P * Math.pow(1+r,n) + (M*12) * ((Math.pow(1+r,n)-1)/r);
}

let chart, pieChart;

function calculate() {

  let goalVal = +goal.value;
  let targetVal = +target.value;
  let inflationVal = +inflation.value;
  inflationVal = inflationVal > 1 ? inflationVal/100 : inflationVal;

  let table = "<tr><th>Year</th><th>Total</th><th>Inflation Adj</th></tr>";

  let labels=[], totals=[], inflAdj=[];
  let finalValue=0, assetFinal={};

  for (let year=0; year<=goalVal; year++) {

    let total=0;

    keys.forEach(key => {
      let P = +document.getElementById(key+"_current").value || 0;
      let M = +document.getElementById(key+"_monthly").value || 0;
      let r = (+document.getElementById(key+"_rate").value || 0)/100;

      let val = fv(P,M,r,year);
      total += val;

      if(year===goalVal) assetFinal[key]=val;
    });

    let infl = total / Math.pow(1+inflationVal, year);

    labels.push(year);
    totals.push(Math.round(total));
    inflAdj.push(Math.round(infl));

    table += `<tr>
      <td>${year}</td>
      <td>${Math.round(total).toLocaleString()}</td>
      <td>${Math.round(infl).toLocaleString()}</td>
    </tr>`;

    if(year===goalVal) finalValue=total;
  }

  tableEl.innerHTML = table;

  let gap = finalValue - targetVal;

  statusEl.innerText = finalValue >= targetVal ? "✅ ON TRACK" : "❌ OFF TRACK";

  gapEl.innerText = "Goal Gap: ₹" +
    Math.abs(Math.round(gap)).toLocaleString() +
    (gap>=0 ? " surplus" : " short");

  if(chart) chart.destroy();

  chart = new Chart(chartEl, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Total", data: totals },
        { label: "Inflation Adj", data: inflAdj }
      ]
    }
  });

  if(pieChart) pieChart.destroy();

  pieChart = new Chart(pieEl, {
    type: "pie",
    data: {
      labels: assetNames,
      datasets: [{ data: Object.values(assetFinal) }]
    }
  });
}

function downloadExcel() {
  let rows = [["Year","Total","Inflation Adj"]];
  document.querySelectorAll("#table tr").forEach((tr,i)=>{
    if(i===0) return;
    let td=tr.querySelectorAll("td");
    rows.push([
      td[0].innerText,
      td[1].innerText.replace(/,/g,""),
      td[2].innerText.replace(/,/g,"")
    ]);
  });
  let wb=XLSX.utils.book_new();
  let ws=XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb,ws,"Projection");
  XLSX.writeFile(wb,"FinancialPlan.xlsx");
}

// shortcuts
const goal = document.getElementById("goal");
const target = document.getElementById("target");
const inflation = document.getElementById("inflation");
const tableEl = document.getElementById("table");
const statusEl = document.getElementById("status");
const gapEl = document.getElementById("gap");
const chartEl = document.getElementById("chart");
const pieEl = document.getElementById("pie");

calculate();

</script>

</body>
</html>
