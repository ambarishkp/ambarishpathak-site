<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Goal Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

a {
  color: #38bdf8;
  text-decoration: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  background: #020617;
  border: 1px solid #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #38bdf8;
  border: none;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}

td, th {
  padding: 6px;
  border-bottom: 1px solid #1e293b;
  text-align: right;
}

.status { font-size: 20px; margin-top: 10px; }
.gap { font-size: 16px; margin-top: 5px; }
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h1>Financial Goal Planner</h1>
  <a href="index.html">← Back to Home</a>
</div>

<div class="grid">

<!-- INPUT -->
<div class="card">

<h3>Goal Settings</h3>
<input id="goal" value="20">
<input id="target" value="50000000">
<input id="inflation" value="6">

<h3>Assets</h3>
<div id="assets"></div>

<button onclick="calculate()">Calculate</button>
<button onclick="downloadExcel()">Download XLS</button>

<div class="status" id="status"></div>
<div class="gap" id="gap"></div>

</div>

<!-- OUTPUT -->
<div class="card">

<h3>Projection</h3>
<table id="table"></table>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>

</div>

</div>

</div>

<script>

const assetNames = ["PF","PPF","NPS","Equity","MF"];

const defaults = {
  PF: { current: 1000000, monthly: 10000, rate: 10 },
  PPF: { current: 500000, monthly: 5000, rate: 7 },
  NPS: { current: 200000, monthly: 10000, rate: 9 },
  Equity: { current: 1500000, monthly: 25000, rate: 12 },
  MF: { current: 800000, monthly: 15000, rate: 12 }
};

const assetDiv = document.getElementById("assets");

assetNames.forEach(name => {
  assetDiv.innerHTML += `
    <h4>${name}</h4>
    <input id="${name}_current" value="${defaults[name].current}">
    <input id="${name}_monthly" value="${defaults[name].monthly}">
    <input id="${name}_rate" value="${defaults[name].rate}">
  `;
});

function fv(P, M, r, n) {
  if (r === 0) return P + (M * 12 * n);
  return P * Math.pow(1+r,n) + (M*12) * ((Math.pow(1+r,n)-1)/r);
}

let chart, pieChart;
let lastData = [];

function calculate() {

  let goal = +document.getElementById("goal").value;
  let target = +document.getElementById("target").value;
  let inflation = +document.getElementById("inflation").value;
  inflation = inflation > 1 ? inflation/100 : inflation;

  let table = "<tr><th>Year</th><th>Total</th><th>Inflation Adj</th></tr>";

  let labels = [], totals = [], inflAdj = [];

  let finalValue = 0;
  let assetFinal = {};

  for (let year = 0; year <= goal; year++) {

    let total = 0;

    assetNames.forEach(name => {
      let P = +document.getElementById(name+"_current").value || 0;
      let M = +document.getElementById(name+"_monthly").value || 0;
      let r = (+document.getElementById(name+"_rate").value || 0)/100;

      let val = fv(P,M,r,year);
      total += val;

      if (year === goal) assetFinal[name] = val;
    });

    let infl = total / Math.pow(1+inflation, year);

    labels.push(year);
    totals.push(Math.round(total));
    inflAdj.push(Math.round(infl));

    table += `<tr>
      <td>${year}</td>
      <td>${Math.round(total).toLocaleString()}</td>
      <td>${Math.round(infl).toLocaleString()}</td>
    </tr>`;

    if (year === goal) finalValue = total;
  }

  document.getElementById("table").innerHTML = table;

  // Status + Gap
  let gap = finalValue - target;
  document.getElementById("status").innerText =
    finalValue >= target ? "✅ ON TRACK" : "❌ OFF TRACK";

  document.getElementById("gap").innerText =
    "Goal Gap: ₹" + Math.abs(Math.round(gap)).toLocaleString() +
    (gap >= 0 ? " surplus" : " short");

  // Line chart
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Total", data: totals, borderWidth: 2 },
        { label: "Inflation Adj", data: inflAdj, borderWidth: 2 }
      ]
    }
  });

  // Pie chart
  if (pieChart) pieChart.destroy();

  pieChart = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: {
      labels: Object.keys(assetFinal),
      datasets: [{
        data: Object.values(assetFinal)
      }]
    }
  });

  lastData = [{labels, totals, inflAdj}];
}

// Download Excel
function downloadExcel() {

  let rows = [["Year","Total","Inflation Adj"]];

  let tableRows = document.querySelectorAll("#table tr");

  tableRows.forEach((tr, i) => {
    if (i === 0) return;
    let cols = tr.querySelectorAll("td");
    rows.push([
      cols[0].innerText,
      cols[1].innerText.replace(/,/g,""),
      cols[2].innerText.replace(/,/g,"")
    ]);
  });

  let wb = XLSX.utils.book_new();
  let ws = XLSX.utils.aoa_to_sheet(rows);

  XLSX.utils.book_append_sheet(wb, ws, "Projection");

  XLSX.writeFile(wb, "FinancialPlan.xlsx");
}

// auto run
calculate();

</script>

</body>
</html>
